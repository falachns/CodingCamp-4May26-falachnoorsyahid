<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
  <main class="dashboard">
    <!-- GREETING SECTION -->
    <section id="greeting" class="greeting-section">
      <h1 id="time" class="time-display">00:00:00</h1>
      <p id="date" class="date-display"></p>
      <p id="greeting-text" class="greeting-message"></p>
    </section>

    <!-- FOCUS TIMER SECTION -->
    <section id="timer" class="timer-section">
      <h2 class="section-title">Focus Timer</h2>
      <div class="timer-duration-group">
        <label for="timer-duration" class="timer-duration-label">Duration (minutes):</label>
        <input type="number" id="timer-duration" class="input-field timer-duration-input" value="25" min="1" max="120" aria-label="Timer duration in minutes">
        <button id="set-duration-btn" class="btn btn-secondary btn-small">Set</button>
      </div>
      <p id="timer-display" class="timer-display">25:00</p>
      <div class="timer-controls">
        <button id="start-btn" class="btn btn-primary">Start</button>
        <button id="stop-btn" class="btn btn-secondary">Stop</button>
        <button id="reset-btn" class="btn btn-secondary">Reset</button>
      </div>
    </section>

    <!-- TO-DO LIST SECTION -->
    <section id="todo" class="todo-section">
      <h2 class="section-title">Tasks</h2>
      <div class="task-input-group">
        <input type="text" id="task-input" class="input-field" placeholder="Add a new task..." aria-label="New task">
        <button id="add-task-btn" class="btn btn-primary">Add</button>
      </div>
      <div class="task-sort-group">
        <label for="task-sort" class="sort-label">Sort by:</label>
        <select id="task-sort" class="sort-select" aria-label="Sort tasks">
          <option value="default">Default (newest first)</option>
          <option value="alphabetical">Alphabetical (A-Z)</option>
          <option value="status">Status (incomplete first)</option>
        </select>
      </div>
      <ul id="task-list" class="task-list"></ul>
    </section>

    <!-- QUICK LINKS SECTION -->
    <section id="links" class="links-section">
      <h2 class="section-title">Quick Links</h2>
      <div class="link-input-group">
        <input type="text" id="link-name" class="input-field" placeholder="Link name" aria-label="Link name">
        <input type="text" id="link-url" class="input-field" placeholder="URL" aria-label="Link URL">
        <button id="add-link-btn" class="btn btn-primary">Add Link</button>
      </div>
      <div id="link-list" class="link-list"></div>
    </section>
  </main>

  <script src="JS/main.js"></script>
</body>
</html>
